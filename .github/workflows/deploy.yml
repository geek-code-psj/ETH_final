name: CI/CD — HRMS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests & Lint ──────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hrms_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: hrms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=__pycache__,.venv --count --statistics || true

      - name: Health check (import test)
        env:
          DATABASE_URL: postgresql://hrms_test:testpass@localhost/hrms_test
          DEV_MODE: "true"
          FIREBASE_SERVICE_ACCOUNT_JSON: "{}"
          FRONTEND_URL: "http://localhost:5173"
        run: |
          python -c "
          import os
          os.environ.setdefault('DATABASE_URL', 'postgresql://hrms_test:testpass@localhost/hrms_test')
          from database import engine
          from models import Base
          Base.metadata.create_all(bind=engine)
          print('✓ Database tables created successfully')
          "

  # ─── Frontend Build ────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: Build
        env:
          VITE_API_URL: https://placeholder.onrender.com
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html && echo "✓ index.html present"
          test -d dist/assets     && echo "✓ assets directory present"
          echo "Build size: $(du -sh dist | cut -f1)"

  # ─── Deploy to Render (on main push only) ─────────────────────────────────
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Backend to Render
        if: env.RENDER_BACKEND_DEPLOY_HOOK != ''
        env:
          RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          curl -X POST "$RENDER_BACKEND_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            --silent --show-error

      - name: Deploy Frontend to Render
        if: env.RENDER_FRONTEND_DEPLOY_HOOK != ''
        env:
          RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          curl -X POST "$RENDER_FRONTEND_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            --silent --show-error

      - name: Summary
        run: echo "✓ Deploy hooks triggered for main branch push"
