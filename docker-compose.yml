version: "3.9"

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hrms_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Periodic Backup ─────────────────────────────────────────────────────────
  pg-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: hrms_db_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD will be read from .env
      SCHEDULE: "@daily" # run backup daily
      BACKUP_KEEP_DAYS: 7
    volumes:
      - ./backups:/backups

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app       # live reload in dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── React Frontend (dev server) ─────────────────────────────────────────────
  frontend:
    image: node:20-slim
    container_name: hrms_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules       # preserve node_modules inside container
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  postgres_data:
